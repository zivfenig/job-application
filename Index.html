<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JobTrack – Application Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head><!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JobTrack – Application Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- LOGIN SCREEN -->
  <div id="loginScreen" class="login-screen" style="display:none">
    <div class="login-box">
      <div class="login-logo">JT</div>
      <div class="login-title">JobTrack</div>
      <div class="login-sub">Sign in to continue</div>
      <div class="login-form">
        <div class="form-group">
          <label class="form-label">Username</label>
          <input class="form-input" id="loginUser" type="text"
            placeholder="Enter username" autocomplete="username" autofocus>
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input class="form-input" id="loginPass" type="password"
            placeholder="Enter password" autocomplete="current-password">
        </div>
        <div class="login-err" id="loginErr"></div>
        <button class="btn-save" onclick="doLogin()">Sign In →</button>
      </div>
    </div>
  </div>

  <!-- APP SHELL (hidden until logged in) -->
  <div id="appShell" style="display:none">

  <!-- HEADER -->
  <header class="header">
    <div class="header-left">
      <div class="logo">JT</div>
      <div class="header-title">
        <span class="title-main">JobTrack</span>
        <span class="title-sub">Application Tracker</span>
      </div>
    </div>
    <div class="header-right">
      <div class="stats-bar" id="statsBar"></div>
      <div class="user-badge">
        <span class="user-name" id="loggedUser"></span>
        <button class="btn-logout" onclick="doLogout()" title="Sign out">⏏</button>
      </div>
      <button class="btn-add" onclick="openAddModal()">+ New Application</button>
    </div>
  </header>

  <!-- FILTER BAR -->
  <div class="filter-bar">
    <div class="filter-left">
      <button class="filter-chip active" data-filter="all" onclick="setFilter('all', this)">All</button>
      <button class="filter-chip" data-filter="open" onclick="setFilter('open', this)">Open</button>
      <button class="filter-chip" data-filter="interview" onclick="setFilter('interview', this)">Interview</button>
      <button class="filter-chip" data-filter="offer" onclick="setFilter('offer', this)">Offer</button>
      <button class="filter-chip" data-filter="rejected" onclick="setFilter('rejected', this)">Rejected</button>
      <button class="filter-chip" data-filter="ghosted" onclick="setFilter('ghosted', this)">Ghosted</button>
    </div>
    <div class="filter-right">
      <input class="search-input" id="searchInput" placeholder="Search company or role…" oninput="renderList()">
      <select class="sort-select" id="sortSelect" onchange="renderList()">
        <option value="date-desc">Newest first</option>
        <option value="date-asc">Oldest first</option>
        <option value="company">Company A–Z</option>
        <option value="status">By status</option>
      </select>
    </div>
  </div>

  <!-- MAIN LIST -->
  <main class="main">
    <div class="list" id="appList"></div>
    <div class="empty-state" id="emptyState" style="display:none">
      <div class="empty-icon">📋</div>
      <div class="empty-title">No applications yet</div>
      <div class="empty-sub">Click "+ New Application" to start tracking</div>
    </div>
  </main>

  <!-- MODAL OVERLAY -->
  <div class="modal-overlay" id="modalOverlay" onclick="onOverlayClick(event)">
    <div class="modal" id="modal">
      <div class="modal-header">
        <div class="modal-title" id="modalTitle">New Application</div>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </div>

  </div><!-- /appShell -->

  <script src="app.js"></script>
</body>
</html>
